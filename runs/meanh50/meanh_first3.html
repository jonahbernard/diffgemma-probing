<!doctype html>
<html><head><meta charset="utf-8"><title>diffgemma meanH overlay</title>
<style>

</style></head><body>
  <h3>mean token entropy per denoising step (3 canvases/method)</h3>
  <div class="legend">
    <span class="sw" style="background:#2a7"></span>bf16
    <span class="sw" style="background:#c44"></span>mxfp4
    <span class="sw" style="background:#36c"></span>mixed-prec
    <span class="sw" style="background:#e6a000"></span>commit threshold (0.005)
    <label class="legend"><input type="checkbox" id="logy"> log y-axis</label>
    <label class="legend"><input type="checkbox" id="band" checked> +/-1 sigma band</label>
    <label class="legend"><input type="checkbox" id="percanvas"> per-canvas lines</label>
  </div>
  <div id="chart"></div>
  <div id="readout">&nbsp;</div>
<script>
// each: {mean:[[step,v]...], lo:[...], hi:[...], color:"#..", name:".."}
const SERIES = [{"name": "bf16", "color": "#2a7", "mean": [[1, 0.50562], [2, 0.33035], [3, 0.1334], [4, 0.0596], [5, 0.01096], [6, 0.00459], [7, 0.0004]], "lo": [[1, 0.48833], [2, 0.31357], [3, 0.1302], [4, 0.02972], [5, 0.00222], [6, 0.00321], [7, 0.0004]], "hi": [[1, 0.52292], [2, 0.34712], [3, 0.13661], [4, 0.08949], [5, 0.0197], [6, 0.00597], [7, 0.0004]], "lines": [[[1, 0.4934], [2, 0.31185], [3, 0.13242], [4, 0.052], [5, 0.02046], [6, 0.00557], [7, 0.0004]], [[2, 0.3346], [3, 0.13081], [4, 0.09256], [5, 0.00326]], [[1, 0.51785], [2, 0.34458], [3, 0.13698], [4, 0.03426], [5, 0.00914], [6, 0.00362]]]}, {"name": "mxfp4", "color": "#c44", "mean": [[1, 0.59173], [2, 0.48006], [3, 0.28535], [4, 0.23925], [5, 0.14961], [6, 0.12797], [7, 0.07335], [8, 0.05984], [9, 0.05609], [10, 0.04356], [11, 0.05715], [12, 0.03706], [13, 0.03997], [14, 0.03657], [15, 0.03332], [16, 0.03228], [17, 0.02833], [18, 0.0234], [19, 0.03385], [20, 0.02575], [21, 0.01277], [22, 0.0083], [23, 0.02002], [24, 0.00988], [25, 0.01044], [26, 0.01343], [27, 0.00515], [28, 0.00783], [29, 0.0088], [30, 0.00904], [31, 0.01225], [32, 0.01313], [33, 0.0093], [34, 0.00755], [35, 0.00303]], "lo": [[1, 0.56836], [2, 0.46781], [3, 0.22865], [4, 0.13538], [5, 0.08821], [6, 0.09428], [7, 0.05669], [8, 0.0505], [9, 0.03036], [10, 0.02621], [11, 0.00156], [12, 0.0], [13, 0.00355], [14, 0.01744], [15, 0.0], [16, 0.00868], [17, 0.00948], [18, 0.0], [19, 0.01352], [20, 0.01336], [21, 0.01119], [22, 0.0078], [23, 0.00821], [24, 0.00714], [25, 0.005], [26, 0.01252], [27, 0.00283], [28, 0.00783], [29, 0.0088], [30, 0.00904], [31, 0.01225], [32, 0.01313], [33, 0.0093], [34, 0.00755], [35, 0.00303]], "hi": [[1, 0.6151], [2, 0.49231], [3, 0.34206], [4, 0.34311], [5, 0.21102], [6, 0.16166], [7, 0.09], [8, 0.06918], [9, 0.08183], [10, 0.06091], [11, 0.11275], [12, 0.0742], [13, 0.07639], [14, 0.05571], [15, 0.0687], [16, 0.05588], [17, 0.04717], [18, 0.04895], [19, 0.05418], [20, 0.03814], [21, 0.01436], [22, 0.0088], [2 , 0.02862], [34, 0.03857], [35, 0.02434], [36, 0.02869], [37, 0.04626], [38, 0.03866], [39, 0.03581], [40, 0.0123], [41, 0.00995], [42, 0.00264]], "lo": [[1, 0.57712], [2, 0.45457], [3, 0.30744], [4, 0.21073], [5, 0.14676], [6, 0.11527], [7, 0.08114], [8, 0.0193], [9, 0.00447], [10, 0.0], [11, 0.0], [12, 0.0], [13, 0.00502], [14, 0.0], [15, 0.0], [16, 0.0], [17, 0.0], [18, 0.0], [19, 0.0], [20, 0.0], [21, 0.0], [22, 0.00321], [23, 0.0], [24, 0.0], [25, 0.06473], [26, 0.05545], [27, 0.04733], [28, 0.03933], [29, 0.02745], [30, 0.02259], [31, 0.01583], [32, 0.01956], [33, 0.02862], [34, 0.03857], [35, 0.02434], [36, 0.02869], [37, 0.04626], [38, 0.03866], [39, 0.03581], [40, 0.0123], [41, 0.00995], [42, 0.00264]], "hi": [[1, 0.64834], [2, 0.50513], [3, 0.32207], [4, 0.26334], [5, 0.1902], [6, 0.13937], [7, 0.14004], [8, 0.09424], [9, 0.08135], [10, 0.08849], [11, 0.05881], [12, 0.07946], [13, 0.06184], [14, 0.07594], [15, 0.06642], [16, 0.06762], [17, 0.05337], [18, 0.04574], [19, 0.05253], [20, 0.0737], [21, 0.07958], [22, 0.03332], [23, 0.07133], [24, 0.08055], [25, 0.06473], [26, 0.05545], [27, 0.04733], [28, 0.03933], [29, 0.02745], [30, 0.02259], [31, 0.01583], [32, 0.01956], [33, 0.02862], [34, 0.03857], [35, 0.02434], [36, 0.02869], [37, 0.04626], [38, 0.03866], [39, 0.03581], [40, 0.0123], [41, 0.00995], [42, 0.00264]], "lines": [[[1, 0.58123], [2, 0.50781], [3, 0.32295], [4, 0.25366], [5, 0.18427], [6, 0.1197], [7, 0.10633], [8, 0.03114], [9, 0.01943], [10, 0.01302], [11, 0.00794], [12, 0.00948], [13, 0.01359], [14, 0.01793], [15, 0.0062], [16, 0.00618], [17, 0.01311], [18, 0.00815], [19, 0.00629], [20, 0.00512], [21, 0.00551], [22, 0.00762], [23, 0.00914], [24, 0.00456]], [[1, 0.6056], [2, 0.45862], [3, 0.31241], [4, 0.25074], [5, 0.14371], [6, 0.12104], [7, 0.14194], [8, 0.09978], [9, 0.08727], [10, 0.0959], [11, 0.06324], [12, 0.08589], [13, 0.06598], [14, 0.08179], [15, 0.07175], [16, 0.07344], [17, 0.05743], [18, 0.04953], [19, 0.05713], [20, 0.06193], [21, 0.06687], [22, 0.02891], [23, 0.06066], [24, 0.06751], [25, 0.06473], [26, 0.05545], [27, 0.04733], [28, 0.03933], [29, 0.02745], [30, 0.02259], [31, 0.01583], [32, 0.01956], [33, 0.02862], [34, 0.03857], [35, 0.02434], [36, 0.02869], [37, 0.04626], [38, 0.03866], [39, 0.03581], [40, 0.0123], [41, 0.00995], [42, 0.00264]], [[1, 0.65137], [2, 0.47312], [3, 0.3089], [4, 0.20671], [5, 0.17746], [6, 0.14121], [7, 0.0835], [8, 0.0394], [9, 0.02203], [10, 0.01293], [11, 0.01488], [12, 0.01579], [13, 0.02073], [14, 0.0084], [15, 0.01357], [16, 0.00956], [17, 0.00676], [18, 0.00513], [19, 0.00485]]]}];
const CONF = 0.005;
const W = 980, H = 500, PADL = 64, PADR = 20, PADT = 20, PADB = 44;
const PW = W - PADL - PADR, PH = H - PADT - PADB;

let logY = false, showBand = true, perCanvas = false;
const allSteps = [], allVals = [];
for (const s of SERIES) {
  for (const d of s.hi) { allSteps.push(d[0]); allVals.push(d[1]); }
  for (const d of s.lo) { allVals.push(d[1]); }
  for (const ln of (s.lines || [])) {
    for (const d of ln) { allSteps.push(d[0]); allVals.push(d[1]); }
  }
}
const xMin = Math.min(...allSteps), xMax = Math.max(...allSteps);
const yMaxRaw = Math.max(...allVals, CONF);
const posVals = allVals.concat([CONF]).filter(v => v > 0);
const yMinPos = posVals.length ? Math.min(...posVals) : 1e-6;

const xScale = s => PADL + (xMax === xMin ? 0 : (s - xMin) / (xMax - xMin) * PW);
function yScale(v) {
  if (logY) {
    const lo = Math.log10(yMinPos), hi = Math.log10(yMaxRaw || 1);
    const vv = Math.log10(Math.max(v, yMinPos));
    return PADT + (hi === lo ? 0 : (1 - (vv - lo) / (hi - lo)) * PH);
  }
  return PADT + (1 - v / (yMaxRaw || 1)) * PH;
}
function linePath(series) {
  return series.map((d, i) =>
    (i ? "L" : "M") + xScale(d[0]).toFixed(1) + " " + yScale(d[1]).toFixed(1)
  ).join(" ");
}
function bandPath(lo, hi) {
  const up = hi.map((d, i) =>
    (i ? "L" : "M") + xScale(d[0]).toFixed(1) + " " + yScale(d[1]).toFixed(1));
  const dn = lo.slice().reverse().map(d =>
    "L" + xScale(d[0]).toFixed(1) + " " + yScale(d[1]).toFixed(1));
  return up.join(" ") + " " + dn.join(" ") + " Z";
}
function ticksY() {
  const out = [];
  if (logY) {
    let e = Math.floor(Math.log10(yMinPos));
    const top = Math.ceil(Math.log10(yMaxRaw || 1));
    for (; e <= top; e++) out.push(Math.pow(10, e));
  } else {
    const n = 5;
    for (let i = 0; i <= n; i++) out.push(yMaxRaw * i / n);
  }
  return out;
}
function ticksX() {
  const out = [], span = xMax - xMin, stepGuess = Math.ceil(span / 10) || 1;
  for (let s = xMin; s <= xMax; s += stepGuess) out.push(s);
  if (out[out.length - 1] !== xMax) out.push(xMax);
  return out;
}
const SVGNS = "http://www.w3.org/2000/svg";
function el(name, attrs) {
  const n = document.createElementNS(SVGNS, name);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  return n;
}
function hexA(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16),
        b = parseInt(hex.slice(5, 7), 16);
  return "rgba(" + r + "," + g + "," + b + "," + a + ")";
}
let svg;
function draw() {
  const chart = document.getElementById('chart');
  chart.innerHTML = "";
  svg = el("svg", {width: W, height: H, viewBox: "0 0 " + W + " " + H});
  for (const t of ticksY()) {
    const y = yScale(t);
    svg.appendChild(el("line", {class:"grid", x1:PADL, y1:y, x2:W-PADR, y2:y}));
    const lbl = el("text", {class:"ax-lbl", x:PADL-6, y:y+3, "text-anchor":"end"});
    lbl.textContent = t >= 0.01 || t === 0 ? t.toFixed(3) : t.toExponential(0);
    svg.appendChild(lbl);
  }
  for (const t of ticksX()) {
    const x = xScale(t);
    svg.appendChild(el("line", {class:"grid", x1:x, y1:PADT, x2:x, y2:H-PADB}));
    const lbl = el("text", {class:"ax-lbl", x:x, y:H-PADB+16, "text-anchor":"middle"});
    lbl.textContent = t;
    svg.appendChild(lbl);
  }
  svg.appendChild(el("line", {class:"axis", x1:PADL, y1:PADT, x2:PADL, y2:H-PADB}));
  svg.appendChild(el("line", {class:"axis", x1:PADL, y1:H-PADB, x2:W-PADR, y2:H-PADB}));
  const xt = el("text", {class:"ax-lbl", x:PADL+PW/2, y:H-6, "text-anchor":"middle"});
  xt.textContent = "denoising step"; svg.appendChild(xt);
  const yt = el("text", {class:"ax-lbl", x:14, y:PADT+PH/2,
    "text-anchor":"middle", transform:"rotate(-90 14 " + (PADT+PH/2) + ")"});
  yt.textContent = "mean token entropy"; svg.appendChild(yt);
  if (!(logY && CONF <= 0)) {
    const yT = yScale(CONF);
    svg.appendChild(el("line", {class:"thr", x1:PADL, y1:yT, x2:W-PADR, y2:yT}));
  }
  if (showBand && !perCanvas) {
    for (const s of SERIES) {
      svg.appendChild(el("path", {d:bandPath(s.lo, s.hi), fill:hexA(s.color, 0.13),
        stroke:"none"}));
    }
  }
  if (perCanvas) {
    for (const s of SERIES) {
      for (const ln of (s.lines || [])) {
        if (ln.length < 2) continue;
        svg.appendChild(el("path", {d:linePath(ln), fill:"none",
          stroke:hexA(s.color, 0.45), "stroke-width":1}));
      }
    }
  }
  for (const s of SERIES) {
    svg.appendChild(el("path", {d:linePath(s.mean), fill:"none", stroke:s.color,
      "stroke-width":2}));
    for (const d of s.mean) {
      svg.appendChild(el("circle", {cx:xScale(d[0]), cy:yScale(d[1]), r:2,
        fill:s.color}));
    }
  }
  const guide = el("line", {class:"axis", x1:0, y1:PADT, x2:0, y2:H-PADB,
    stroke:"#bbb", "stroke-dasharray":"2 2", visibility:"hidden"});
  svg.appendChild(guide);
  const hit = el("rect", {x:PADL, y:PADT, width:PW, height:PH, fill:"transparent"});
  svg.appendChild(hit);
  const ro = document.getElementById('readout');
  function nearest(series, sx) {
    let best = null, bd = Infinity;
    for (const d of series) { const dx = Math.abs(xScale(d[0]) - sx);
      if (dx < bd) { bd = dx; best = d; } }
    return best;
  }
  hit.addEventListener('mousemove', e => {
    const r = svg.getBoundingClientRect();
    const sx = (e.clientX - r.left) * (W / r.width);
    guide.setAttribute('x1', sx); guide.setAttribute('x2', sx);
    guide.setAttribute('visibility', 'visible');
    let parts = [];
    let step = "-";
    for (const s of SERIES) {
      const p = nearest(s.mean, sx);
      if (p) step = p[0];
      parts.push("<span style='color:" + s.color + "'>" + s.name + " meanH=" +
        (p ? p[1] : "-") + "</span>");
    }
    ro.innerHTML = "step " + step + " &nbsp; " + parts.join(" &nbsp; ");
  });
  hit.addEventListener('mouseleave', () => {
    guide.setAttribute('visibility', 'hidden'); ro.innerHTML = "&nbsp;";
  });
  chart.appendChild(svg);
}
document.getElementById('logy').addEventListener('change', e => {
  logY = e.target.checked; draw();
});
document.getElementById('band').addEventListener('change', e => {
  showBand = e.target.checked; draw();
});
document.getElementById('percanvas').addEventListener('change', e => {
  perCanvas = e.target.checked; draw();
});
draw();
</script></body></html>
